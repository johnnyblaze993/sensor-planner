services:
  planner-service:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      PLANNER_CPP_TIMEOUT: 5s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
